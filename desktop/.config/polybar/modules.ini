[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
;mount-1 = /home/rt/mnt/big-dick-pool
;mount-2 = /home/rt/mnt/red-share
label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/fs-bdp]
type = internal/fs
interval = 25
mount-0 = /home/rt/mnt/big-dick-pool
label-mounted = %{F#22E8B5}bdp%{F-} %percentage_used%%
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/fs-red]
type = internal/fs
interval = 25
mount-0 = /home/rt/mnt/red-share
label-mounted = %{F#F14A7D}red%{F-} %percentage_used%%
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "’ŗø "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "’éĆ "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/battery]
type = internal/battery
low-at = 15
battery = BAT0

[module/backlight]
type = internal/backlight
card = intel_backlight
use-actual-brightness = true

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1
date = " %a, %b %d, %Y"
time = "%I:%M%p"
format-prefix = ŅĆ¢
format-prefix-foreground = ${colors.foreground-alt}
format-underline = ${purple}
label = %date% %time%

# custom modules

[module/powermenu]
type = custom/menu
format-spacing = 1
label-open = ’Ćæ
label-open-foreground = ${colors.secondary}
label-close = Ņüź cancel
label-close-foreground = ${colors.secondary}
label-separator = |
label-separator-foreground = ${colors.foreground-alt}
menu-0-0 = reboot
menu-0-0-exec = menu-open-1
menu-0-1 = power off
menu-0-1-exec = menu-open-2
menu-1-0 = cancel
menu-1-0-exec = menu-open-0
menu-1-1 = reboot
menu-1-1-exec = sudo reboot
menu-2-0 = power off
menu-2-0-exec = sudo poweroff
menu-2-1 = cancel
menu-2-1-exec = menu-open-0

[module/vpn]
type = custom/script
exec = $HOME/.config/polybar/scripts/vpn_module.sh
click-left = $HOME/.config/polybar/scripts/vpn_module.sh --toggle-connection &
click-right = $HOME/.config/polybar/scripts/vpn_module.sh --location-menu &
click-middle = $HOME/.config/polybar/scripts/vpn_module.sh --ip-address &
interval = 5
format = <label>
format-background = ${color.mb}

[module/weather]
type = custom/script
exec = $HOME/.config/polybar/scripts/weather-plugin.sh
tail = false
interval = 960

[module/network-networkmanager]
type = custom/script
exec = $HOME/.config/polybar/scripts/network-networkmanager.sh
tail = true

[module/network-traffic]
type = custom/script
exec = $HOME/.config/polybar/scripts/network-traffic.sh
tail = true

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false
strip-wsnumbers = true

ws-icon-0 = 1;’ē®"
ws-icon-1 = 2;’Æē
ws-icon-2 = 3;’Ł«
ws-icon-3 = 4;’ÆŖ
ws-icon-4 = 5;’Ö©
ws-icon-5 = 6;’åĘ
ws-icon-6 = 7;’äŠ
ws-icon-7 = 8;’Ćā
ws-icon-8 = 9;’½é
ws-icon-9 = 10;’ē©

; Only show workspaces on the same output as the bar
pin-workspaces = true

label-mode-padding = 1
label-mode-foreground = #000
label-mode-background = ${colors.primary}

; focused = Active workspace on focused monitor
label-focused = %name% %icon%
label-focused-background = ${colors.background-alt}
label-focused-underline = ${colors.primary}
label-focused-padding = 1

; unfocused = Inactive workspace on any monitor
label-unfocused = %name% %icon%
label-unfocused-padding = 1 

; visible = Active workspace on unfocused monitor
label-visible = %name% %icon%
label-visible-background = ${self.label-focused-background}
label-visible-underline = ${self.label-focused-underline}
label-visible-padding = ${self.label-focused-padding}

; urgent = Workspace with urgency hint set
label-urgent = %name% %icon%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1


[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini